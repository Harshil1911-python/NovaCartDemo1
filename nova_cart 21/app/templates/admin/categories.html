{% extends "admin/base.html" %}
{% block title %}Categories{% endblock %}
{% block page_title %}Categories{% endblock %}
{% block content %}
<div class="form-grid-2">
  <div class="admin-card">
    <h3>Add Category</h3>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
      <div class="form-group"><label>Icon (FontAwesome class)</label><input type="text" name="icon" placeholder="fas fa-bolt" value="fas fa-tag"></div>
      <div class="form-group"><label>Color</label><input type="color" name="color" value="#6C63FF"></div>
      <div class="form-group"><label>Description</label><input type="text" name="description"></div>
      <button class="btn btn-primary">Add Category</button>
    </form>
  </div>
  <div class="admin-card">
    <h3>All Categories</h3>
    <table class="admin-table">
      <thead><tr><th>Icon</th><th>Name</th><th>Slug</th><th>Action</th></tr></thead>
      <tbody>
      {% for c in categories %}
      <tr>
        <td><i class="{{ c.icon }}" style="color:{{ c.color }};font-size:1.4rem"></i></td>
        <td>{{ c.name }}</td>
        <td><code>{{ c.slug }}</code></td>
        <td>
          <form method="POST" action="/x-admin-9f3k2/categories/delete/{{ c.id }}" style="display:inline" onsubmit="return confirm('Delete?')">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
          </form>
        </td>
      </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
