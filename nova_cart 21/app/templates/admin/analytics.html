{% extends "admin/base.html" %}
{% block title %}Analytics{% endblock %}
{% block page_title %}Analytics & Integrations{% endblock %}
{% block content %}
<form method="POST" class="admin-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="admin-card">
    <h3>Google Analytics</h3>
    <div class="form-group">
      <label>GA4 Tracking ID</label>
      <input type="text" name="ga_tracking_id" value="{{ s.get('ga_tracking_id','') }}" placeholder="G-XXXXXXXXXX">
      <small>Paste your Google Analytics 4 Measurement ID. Will be injected automatically.</small>
    </div>
    <div class="form-group">
      <label class="toggle-label"><input type="checkbox" name="newsletter_active" {% if s.get('newsletter_active')=='true' %}checked{% endif %}> Enable Newsletter Signup in Footer</label>
    </div>
    <button class="btn btn-primary">Save</button>
  </div>
</form>
{% endblock %}
