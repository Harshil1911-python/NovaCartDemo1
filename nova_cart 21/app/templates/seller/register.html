{% extends "base.html" %}
{% block title %}Become a Seller{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:600px">
    <div class="auth-header">
      <h1><i class="fas fa-store"></i> Become a Seller</h1>
      <p>Start selling on Nova Cart today</p>
    </div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-row">
        <div class="form-group flex-1"><label>Your Name</label><input type="text" name="name" required></div>
        <div class="form-group flex-1"><label>Shop Name</label><input type="text" name="shop_name" required></div>
      </div>
      <div class="form-row">
        <div class="form-group flex-1"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group flex-1"><label>Phone</label><input type="tel" name="phone"></div>
      </div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required minlength="6"></div>
      <div class="form-group"><label>Shop Description</label><textarea name="description" rows="3" placeholder="Tell customers about your shop..."></textarea></div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Submit Application</button>
    </form>
    <p class="auth-footer">Already a seller? <a href="/auth/login">Login</a></p>
  </div>
</div>
{% endblock %}
