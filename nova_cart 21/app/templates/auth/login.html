{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Login to your Nova Cart account</p>
    </div>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/auth/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="loginPass" required placeholder="••••••••">
          <button type="button" class="pass-toggle" onclick="togglePass('loginPass')"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Login</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="/auth/register">Register</a></p>
    <p class="auth-footer"><a href="/seller/register">Become a Seller</a></p>
  </div>
</div>
{% endblock %}
