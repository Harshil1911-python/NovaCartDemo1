{% extends "seller/base.html" %}
{% block title %}Store Profile{% endblock %}
{% block page_title %}Store Profile{% endblock %}
{% block content %}
<div class="admin-card" style="max-width:700px">
  <form method="POST" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group"><label>Shop Name</label><input type="text" name="shop_name" value="{{ seller.shop_name }}" required></div>
    <div class="form-group"><label>Description</label><textarea name="description" rows="4">{{ seller.description }}</textarea></div>
    <div class="form-row">
      <div class="form-group flex-1"><label>Contact Email</label><input type="email" name="contact_email" value="{{ seller.contact_email }}"></div>
      <div class="form-group flex-1"><label>Contact Phone</label><input type="tel" name="contact_phone" value="{{ seller.contact_phone }}"></div>
    </div>
    <div class="form-row">
      <div class="form-group flex-1"><label>Logo {% if seller.logo %}<img src="{{ seller.logo }}" height="30">{% endif %}</label><input type="file" name="logo" accept="image/*"></div>
      <div class="form-group flex-1"><label>Banner Image</label><input type="file" name="banner" accept="image/*"></div>
    </div>
    <p><strong>Store URL:</strong> <a href="/shop/store/{{ seller.slug }}" target="_blank">/shop/store/{{ seller.slug }}</a></p>
    <button class="btn btn-primary">Save Profile</button>
  </form>
</div>
{% endblock %}
