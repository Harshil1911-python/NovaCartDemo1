{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Join Nova Cart and start shopping</p>
    </div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST" action="/auth/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Your Name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="regPass" required placeholder="Min 6 characters">
          <button type="button" class="pass-toggle" onclick="togglePass('regPass')"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Repeat password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/auth/login">Login</a></p>
  </div>
</div>
{% endblock %}
